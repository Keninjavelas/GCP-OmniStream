name: CI Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-telemetry-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/telemetry-ingestion-api
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov httpx
          pip install -r requirements.txt || echo "No requirements file found"
      - name: Run tests
        run: pytest --cov=. --cov-report=xml || true 

  test-analytics-processor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/analytics-processor
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r requirements.txt || echo "No requirements file found"
      - name: Run tests
        run: pytest --cov=. --cov-report=xml || true

  test-situational-awareness:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/situational-awareness-stream
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install || echo "No package.json found"
      - name: Run linter
        run: npm run lint --if-present || true
      - name: Run tests
        run: npm test --if-present || true