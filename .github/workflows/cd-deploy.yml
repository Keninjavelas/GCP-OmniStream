name: CD Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Initialize Terraform
        working-directory: infrastructure
        run: terraform init

      - name: Plan Terraform
        working-directory: infrastructure
        run: terraform plan -input=false -var="project_id=${{ secrets.GCP_PROJECT_ID }}"

      - name: Apply Terraform
        working-directory: infrastructure
        run: terraform apply -input=false -auto-approve -var="project_id=${{ secrets.GCP_PROJECT_ID }}"

  deploy-telemetry-api:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Build and Deploy to Cloud Run
        working-directory: services/telemetry-ingestion-api
        run: |
          gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/telemetry-ingestion-api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update-traffic telemetry-ingestion-api \
            --region ${{ vars.GCP_REGION }} \
            --platform managed \
            --to-latest

  deploy-analytics-processor:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Deploy Cloud Function
        working-directory: services/analytics-processor
        run: |
          gcloud functions deploy analytics-processor \
            --runtime python311 \
            --trigger-topic tactical-telemetry-stream \
            --region ${{ vars.GCP_REGION }} \
            --entry-point process_telemetry \
            --set-env-vars PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
